  "/api/v1/regions":
    get:
      summary: List regions
      tags:
      - Regions
      description: Returns release regions (NA, JP, EU, ...). Supports exact `code`
        lookup and `igdb_id` filtering; both return the paginated list shape (a single
        match comes back as a one-element list).
      parameters:
      - name: code
        in: query
        schema:
          type: string
        required: false
        description: Exact `region_code` lookup (e.g. `NA`, `EU`).
      - name: igdb_id
        in: query
        schema:
          type: integer
        required: false
        description: Lookup by IGDB region id (filters on `igdb_region_id`).
      - name: page
        in: query
        schema:
          type: integer
          default: 1
          minimum: 1
        required: false
      - name: per
        in: query
        schema:
          type: integer
          default: 50
          maximum: 500
        required: false
      - name: limit
        in: query
        schema:
          type: integer
          maximum: 500
        required: false
        description: Deprecated alias for `per` (transitional, for the unaudited Discord
          bot).
      - name: offset
        in: query
        schema:
          type: integer
          minimum: 0
        required: false
        description: Deprecated; converted to a page number (transitional, for the
          unaudited Discord bot).
      responses:
        '200':
          description: regions list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      "$ref": "#/components/schemas/Region"
                  meta:
                    "$ref": "#/components/schemas/PaginationMeta"
        '401':
          description: unauthenticated
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
    post:
      summary: Create or upsert a region
      tags:
      - Regions
      description: 'Admin/service-only find-or-create keyed on `igdb_region_id` (the
        bot''s `ensureRegion`). The payload fields map onto the columns: `code` ->
        region_code, `name` -> region_name, `igdb_id` -> igdb_region_id. Returns the
        existing region with 200 when the IGDB id is already known, or creates it
        and returns 201. `code`/`name` are applied only on create.'
      parameters: []
      responses:
        '201':
          description: region created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    "$ref": "#/components/schemas/Region"
        '200':
          description: existing region (matched on IGDB id)
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    "$ref": "#/components/schemas/Region"
        '403':
          description: forbidden — caller is not an admin or service
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
        '422':
          description: validation failed (missing `igdb_id` or blank `code`/`name`)
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
        '401':
          description: unauthenticated
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  properties:
                    code:
                      type: string
                      description: Internal region code, e.g. `NA` (set only on create).
                    name:
                      type: string
                      description: Region name (set only on create).
                    igdb_id:
                      type: integer
                      description: IGDB region id. Required; the upsert key.
                  required:
