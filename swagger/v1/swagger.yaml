              schema:
                type: object
                properties:
                  data:
                    type: object
                    additionalProperties: true
        '401':
          description: unauthenticated
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
