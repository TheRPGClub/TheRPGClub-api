  "/api/v1/users/{user_id}/presence_prompts":
    parameters:
    - name: user_id
      in: path
      schema:
        type: string
      required: true
    get:
      summary: List a user's presence prompt history
      tags:
      - Presence Prompts
      description: 'Read-only history of presence prompts the bot sent the user after
        detecting (via Discord rich presence) that they were playing a game. Ordered
        newest first. The bot owns all writes; the user-settable side is the opt-out
        preference. The optional `game_title_norm` and `status` filters back the bot''s
        lookups: pass `game_title_norm` with `per=1` for the last prompt date of a
        game, or combine with `status=pending` and read `meta.count` for the pending
        counts.'
      parameters:
      - name: game_title_norm
        in: query
        schema:
          type: string
        required: false
        description: Filter to a single normalized game title (matches the bot's normalization).
      - name: status
        in: query
        schema:
          type: string
          enum:
          - PENDING
          - ACCEPTED
          - DECLINED
          - OPT_OUT_GAME
          - OPT_OUT_ALL
        required: false
        description: Filter by lifecycle status. Case-insensitive (`pending` and `PENDING`
          both match).
      - name: page
        in: query
        schema:
          type: integer
          default: 1
          minimum: 1
        required: false
      - name: per
        in: query
        schema:
          type: integer
          default: 50
          maximum: 500
        required: false
      responses:
        '200':
          description: presence prompt history
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      "$ref": "#/components/schemas/PresencePrompt"
                  meta:
                    "$ref": "#/components/schemas/PaginationMeta"
        '401':
          description: unauthenticated
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
    post:
      summary: Create a presence prompt
      tags:
      - Presence Prompts
      description: Service-only. Records a new prompt the bot just sent. `prompt_id`
        is the Discord interaction/message id used to correlate the later resolution.
        The row starts `PENDING` with a server-stamped `created_at`; `status`/`resolved_at`
        are ignored if sent.
      parameters: []
      responses:
        '201':
          description: prompt created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    "$ref": "#/components/schemas/PresencePrompt"
        '403':
          description: forbidden — service token required
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
        '422':
          description: validation failed
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
        '400':
          description: missing `data` parameter
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
        '401':
          description: unauthenticated
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  properties:
                    prompt_id:
                      type: string
                      description: Discord interaction/message id (primary key).
                    game_title:
                      type: string
                      description: The detected game title.
                    game_title_norm:
                      type: string
                      description: Normalized game title (matches the bot's normalization).
                  required:
                  - prompt_id
                  - game_title
                  - game_title_norm
              required:
              - data
        required: true
