  "/api/v1/platforms":
    get:
      summary: List platforms
      tags:
      - Platforms
      description: Returns gaming platforms (consoles, PC, mobile, etc.). Supports
        `q` for case-insensitive name/code search, exact `code` lookup, and IGDB-id
        filtering via `igdb_ids[]` / `igdb_id`. All filters return the paginated list
        shape (a single matching platform comes back as a one-element list).
      parameters:
      - name: q
        in: query
        schema:
          type: string
        required: false
        description: Search term against `platform_name` or `platform_code`.
      - name: code
        in: query
        schema:
          type: string
        required: false
        description: Exact `platform_code` lookup (e.g. `PS5`, `SWITCH`).
      - name: igdb_ids[]
        in: query
        required: false
        explode: true
        style: form
        schema:
          type: array
          items:
            type: integer
        description: 'Filter to platforms with any of these `igdb_platform_id`s. Repeat
          the param: `igdb_ids[]=6&igdb_ids[]=48`.'
      - name: igdb_id
        in: query
        schema:
          type: integer
        required: false
        description: Single-id convenience form of `igdb_ids[]` (filters on `igdb_platform_id`).
      - name: page
        in: query
        schema:
          type: integer
          default: 1
          minimum: 1
        required: false
      - name: per
        in: query
        schema:
          type: integer
          default: 50
          maximum: 500
        required: false
      - name: limit
        in: query
        schema:
          type: integer
          maximum: 500
        required: false
        description: Deprecated alias for `per` (transitional, for the unaudited Discord
          bot).
      - name: offset
        in: query
        schema:
          type: integer
          minimum: 0
        required: false
        description: Deprecated; converted to a page number (transitional, for the
          unaudited Discord bot).
      responses:
        '200':
          description: platforms list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      "$ref": "#/components/schemas/Platform"
                  meta:
                    "$ref": "#/components/schemas/PaginationMeta"
        '401':
          description: unauthenticated
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
    post:
      summary: Create or upsert a platform
      tags:
      - Platforms
      description: 'Admin/service-only find-or-create keyed on `igdb_platform_id`
        (the bot''s `ensurePlatform`). The payload fields map onto the columns: `code`
        -> platform_code, `name` -> platform_name, `igdb_id` -> igdb_platform_id.
        Returns the existing platform with 200 when the IGDB id is already known,
        or creates it and returns 201. `code`/`name` are applied only on create.'
      parameters: []
      responses:
        '201':
          description: platform created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    "$ref": "#/components/schemas/Platform"
        '200':
          description: existing platform (matched on IGDB id)
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    "$ref": "#/components/schemas/Platform"
        '403':
          description: forbidden — caller is not an admin or service
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
        '422':
          description: validation failed (missing `igdb_id` or blank `code`/`name`)
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
        '401':
          description: unauthenticated
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  properties:
                    code:
                      type: string
                      description: Internal platform code, e.g. `PS5` (set only on
                        create).
                    name:
                      type: string
                      description: Platform name (set only on create).
                    igdb_id:
                      type: integer
                      description: IGDB platform id. Required; the upsert key.
                  required:
                  - igdb_id
              required:
              - data
        required: true
