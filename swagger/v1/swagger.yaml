        must be their own id); the bot service token may donate on anyone''s behalf.
        The claim fields are read-only on donation.'
      parameters: []
      responses:
        '201':
          description: key donated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    "$ref": "#/components/schemas/GameKey"
        '403':
          description: forbidden — caller is not the named donor
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
        '422':
          description: validation failed
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
        '400':
          description: missing `data` parameter
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
        '401':
          description: unauthenticated
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: 'Key attributes. Required: `platform`, `key_value`,
                    `donor_user_id`, plus `game_title` OR `gamedb_game_id` (when only
                    `gamedb_game_id` is given the title is backfilled from that game).
                    Optional: `donor_notify_on_claim`. The PK/claim/timestamp columns
                    are server-managed and ignored if sent.'
                  properties:
                    game_title:
                      type: string
                      description: Display label; backfilled from the linked game
                        when omitted.
                    gamedb_game_id:
                      type: integer
                      nullable: true
                      description: Links the key to a GamedbGame for the embedded
                        game card.
                    platform:
                      type: string
                    key_value:
                      type: string
                      description: The key secret.
                    donor_user_id:
                      type: string
                    donor_notify_on_claim:
                      type: boolean
                  required:
                  - platform
                  - key_value
                  - donor_user_id
              required:
              - data
        required: true
  "/api/v1/game_keys/{id}":
    parameters:
    - name: id
      in: path
      schema:
        type: string
      required: true
      description: RpgClubGameKey key_id.
    get:
      summary: Get a single game key
      tags:
      - Game Keys
      description: 'Returns one key with its secret `key_value` revealed. Because
        the secret is exposed, access is restricted to those entitled to the key:
        its donor, an admin, the bot service token, or the user who has claimed it.
        An unclaimed key has no claimer, so (beyond donor/admin/service) it cannot
        be read out-of-band to bypass the claim flow; the listing endpoints never
        expose the secret at all.'
      responses:
        '200':
          description: the game key, with `key_value` revealed
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    "$ref": "#/components/schemas/GameKey"
        '403':
          description: forbidden — caller is not the donor, claimer, an admin, or
            the service token
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
        '404':
          description: not found
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
        '401':
          description: unauthenticated
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
    delete:
      summary: Revoke a game key
      tags:
      - Game Keys
      description: Revokes (deletes) a key. Restricted to the original donor, an admin,
        or the bot service token.
      responses:
        '200':
          description: key revoked
          content:
            application/json:
              schema:
                type: object
                properties:
                  deleted:
                    type: boolean
                required:
                - deleted
        '403':
          description: forbidden — caller is not the donor, an admin, or the service
            token
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
        '404':
          description: not found
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
        '401':
          description: unauthenticated
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
  "/api/v1/game_keys/{id}/claim":
    parameters:
    - name: id
      in: path
      schema:
        type: string
      required: true
      description: RpgClubGameKey key_id.
    post:
      summary: Claim a game key
      tags:
      - Game Keys
      description: Atomically claims an unclaimed key and returns it with the secret
        `key_value` revealed to the claimer. A Discord caller claims as themselves;
        the bot service token claims on behalf of the `claimed_by_user_id` supplied
        in the body.
      parameters: []
      responses:
        '200':
          description: claimed — includes the revealed `key_value`
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    "$ref": "#/components/schemas/GameKey"
        '409':
          description: already claimed
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
        '422':
          description: no claimant resolved (service token omitted `claimed_by_user_id`)
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
        '404':
          description: not found
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
        '401':
          description: unauthenticated
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  description: 'Service-token only: `claimed_by_user_id` names the
                    Discord user the claim is recorded for. Ignored for Discord callers
                    (they claim as themselves).'
                  properties:
                    claimed_by_user_id:
                      type: string
  "/api/v1/users/{user_id}/game_keys":
    parameters:
    - name: user_id
      in: path
      schema:
        type: string
      required: true
      description: Discord user id of the donor.
    get:
      summary: List a user's donated game keys
      tags:
      - Game Keys
      description: The keys donated by the user (claimed and unclaimed), newest first,
        each embedding its `game` (null when unlinked). The secret `key_value` is
        never included.
      parameters:
      - name: page
        in: query
        schema:
          type: integer
          default: 1
          minimum: 1
        required: false
      - name: per
        in: query
        schema:
          type: integer
          default: 50
          maximum: 500
        required: false
      responses:
        '200':
          description: donated game keys
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      "$ref": "#/components/schemas/GameKey"
                  meta:
                    "$ref": "#/components/schemas/PaginationMeta"
        '401':
          description: unauthenticated
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
  "/api/v1/games":
    get:
      summary: List games
      tags:
      - Games
      description: Returns games from the local GameDB. Supports search, a `winner`
        filter for GOTM / Non-Retro GOTM history, and taxonomy filters (genre/engine/theme/perspective/mode/franchise/company).
        Taxonomy params AND across dimensions; repeat one (`genre_id[]=1&genre_id[]=2`)
        to match any of several. Discover valid ids via the `/genres`, `/themes`,
        … endpoints.
      parameters:
      - name: q
        in: query
        schema:
          type: string
        required: false
        description: Full-text search against game titles.
      - name: winner
        in: query
        schema:
          type: string
          enum:
          - gotm
          - nr_gotm
          - any
        required: false
        description: Filter to past GOTM winners, Non-Retro GOTM winners, or either.
      - name: genre_id
        in: query
        required: false
        explode: true
        style: form
        schema:
          type: array
          items:
            type: integer
        description: Filter to games in this genre id (repeat to match any of several).
      - name: engine_id
        in: query
        required: false
        explode: true
        style: form
        schema:
          type: array
          items:
            type: integer
        description: Filter to games using this engine id (repeat to match any of
          several).
      - name: theme_id
        in: query
        required: false
        explode: true
        style: form
        schema:
          type: array
          items:
            type: integer
        description: Filter to games in this theme id (repeat to match any of several).
      - name: perspective_id
        in: query
        required: false
        explode: true
        style: form
        schema:
          type: array
          items:
            type: integer
        description: Filter to games in this perspective id (repeat to match any of
          several).
      - name: mode_id
        in: query
        required: false
        explode: true
        style: form
        schema:
          type: array
          items:
            type: integer
        description: Filter to games in this mode id (repeat to match any of several).
      - name: franchise_id
        in: query
        required: false
        explode: true
        style: form
        schema:
          type: array
          items:
            type: integer
        description: Filter to games in this franchise id (repeat to match any of
          several).
      - name: company_id
        in: query
        required: false
        explode: true
        style: form
        schema:
          type: array
          items:
            type: integer
        description: Filter to games involving this company id (repeat to match any
          of several).
      - name: page
        in: query
        schema:
          type: integer
          default: 1
          minimum: 1
        required: false
      - name: per
        in: query
        schema:
          type: integer
          default: 25
          maximum: 100
        required: false
      - name: limit
        in: query
        schema:
          type: integer
          maximum: 100
        required: false
        description: Deprecated alias for `per` (transitional, for the unaudited Discord
          bot).
      - name: offset
        in: query
        schema:
          type: integer
          minimum: 0
        required: false
        description: Deprecated; converted to a page number (transitional, for the
          unaudited Discord bot).
      responses:
        '200':
          description: games list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      "$ref": "#/components/schemas/Game"
                  meta:
                    allOf:
                    - "$ref": "#/components/schemas/PaginationMeta"
                    - type: object
                      properties:
                        resource:
                          type: string
                          example: gamedb_games
        '401':
          description: unauthenticated
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
    post:
      summary: Create a game from IGDB
      tags:
      - Games
      description: 'Admin/service-only. Creates a game from IGDB by `igdb_id`: fetches
        the full IGDB payload, upserts the game row plus its taxonomy (genres, themes,
        perspectives, modes, engines, franchises, platforms, developer/publisher companies,
        collection) and releases (one per platform, earliest dated; Japan-only releases
        are skipped; `format` is left null), then imports its cover/artwork/logo images
        into Backblaze through the same importer the jobs use. Idempotent on `igdb_id`:
        re-POSTing an existing game refreshes it and returns 200 instead of 201. Discover
        ids via `GET /api/v1/igdb/search`.'
      parameters: []
      responses:
        '201':
          description: game created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    "$ref": "#/components/schemas/Game"
                  images:
                    type: object
                    additionalProperties: true
                    description: The image-import result (cover/artwork/logo diagnostics);
                      shape mirrors the importer's output.
        '200':
          description: existing game refreshed (idempotent)
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    "$ref": "#/components/schemas/Game"
                  images:
                    type: object
                    additionalProperties: true
                    description: The image-import result (cover/artwork/logo diagnostics).
        '400':
          description: missing or non-integer `igdb_id`
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
        '403':
          description: forbidden — admin or service required
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
        '404':
          description: IGDB game not found
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
        '422':
          description: unprocessable (IGDB/Backblaze not configured, invalid image)
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
        '502':
          description: upstream (IGDB or Backblaze) request failed
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
        '401':
          description: unauthenticated
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                igdb_id:
                  type: integer
                  description: The IGDB game id to import.
              required:
              - igdb_id
        required: true
