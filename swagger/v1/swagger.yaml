  "/api/v1/users":
    get:
      summary: List users
      tags:
      - Users
      description: Returns RPG Club users. The `q` parameter searches `username`,
        `global_name`, or an exact `user_id` match.
      parameters:
      - name: q
        in: query
        schema:
          type: string
        required: false
      - name: page
        in: query
        schema:
          type: integer
          default: 1
          minimum: 1
        required: false
      - name: per
        in: query
        schema:
          type: integer
          default: 50
          maximum: 500
        required: false
      - name: limit
        in: query
        schema:
          type: integer
          maximum: 500
        required: false
        description: Deprecated alias for `per` (transitional, for the unaudited Discord
          bot).
      - name: offset
        in: query
        schema:
          type: integer
          minimum: 0
        required: false
        description: Deprecated; converted to a page number (transitional, for the
          unaudited Discord bot).
      responses:
        '200':
          description: users list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
                  meta:
                    "$ref": "#/components/schemas/PaginationMeta"
        '401':
          description: unauthenticated
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
  "/api/v1/users/{user_id}":
    parameters:
    - name: user_id
      in: path
      schema:
        type: string
      required: true
      description: RpgClubUser id (Discord user id).
    get:
      summary: Show user profile
      tags:
      - Users
      description: 'Aggregated profile: user record + membership, socials, and preview
        lists/counts for now-playing, favorites, reviews, completions, and journal
        (recently journaled games).'
      parameters:
      - name: preview_limit
        in: query
        schema:
          type: integer
          default: 10
          maximum: 50
        required: false
        description: Per-preview-list size cap (now_playing, favorites, reviews, completions,
          journal).
      responses:
        '200':
          description: user detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    additionalProperties: true
                    properties:
                      membership:
                        type: object
                        nullable: true
                        additionalProperties: true
                      socials:
                        type: array
                        items:
                          type: object
                          additionalProperties: true
                      now_playing:
                        type: array
                        items:
                          type: object
                          additionalProperties: true
                      favorites:
                        type: array
                        items:
                          type: object
                          additionalProperties: true
                      reviews:
                        type: array
                        items:
                          type: object
                          additionalProperties: true
                      completions:
                        type: array
                        items:
                          type: object
                          additionalProperties: true
                      journal:
                        type: array
                        items:
                          type: object
                          additionalProperties: true
                      counts:
                        type: object
                        properties:
                          now_playing:
                            type: integer
                          favorites:
                            type: integer
                          reviews:
                            type: integer
                          completions:
                            type: integer
                          backlog:
                            type: integer
                          collections:
                            type: integer
                          journal:
                            type: integer
        '404':
          description: user not found
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
        '401':
          description: unauthenticated
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
