        '401':
          description: unauthenticated
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
    post:
      summary: Upload a game image
      tags:
      - Game Images
      description: Uploads an image to Backblaze B2 and links it to the game. Restricted
        to admins or the service account. Send as `multipart/form-data` with the `image`
        parameter.
      parameters: []
      responses:
        '201':
          description: image created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    "$ref": "#/components/schemas/GameImage"
        '403':
          description: forbidden — admin or service required
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
        '422':
          description: unprocessable (invalid image or missing config)
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
        '502':
          description: Backblaze request failed
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
        '401':
          description: unauthenticated
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                  description: Binary image data.
                kind:
                  type: string
                  description: Image kind, e.g. `cover`, `screenshot`, `artwork`.
                is_primary:
                  type: boolean
                  description: Whether this is the primary image for its kind. Defaults
                    to true on create.
              required:
              - file
              - kind
        required: true
