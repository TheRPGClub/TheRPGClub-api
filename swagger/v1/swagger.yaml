  "/api/v1/users/{user_id}/collections":
    parameters:
    - name: user_id
      in: path
      schema:
        type: string
      required: true
      description: Owning RpgClubUser id.
    get:
      summary: List a user's collections
      tags:
      - Collections
      description: 'Open to any authenticated caller. The optional filters mirror
        the bot''s collection search and AND together: `q` (game title, case-insensitive
        substring), `platform` (case-insensitive substring of the platform name/abbreviation/code),
        `ownership_type` (exact) and `game_id` (`gamedb_game_id`).'
      parameters:
      - name: q
        in: query
        schema:
          type: string
        required: false
        description: Filter by game title (case-insensitive substring).
      - name: platform
        in: query
        schema:
          type: string
        required: false
        description: Filter by platform name/abbreviation/code (case-insensitive substring).
      - name: ownership_type
        in: query
        schema:
          type: string
          enum:
          - Digital
          - Physical
          - Subscription
          - Other
        required: false
        description: Filter by exact ownership type.
      - name: game_id
        in: query
        schema:
          type: integer
        required: false
        description: Filter by gamedb_games.game_id.
      - name: page
        in: query
        schema:
          type: integer
          default: 1
          minimum: 1
        required: false
      - name: per
        in: query
        schema:
          type: integer
          default: 50
          maximum: 500
        required: false
      - name: limit
        in: query
        schema:
          type: integer
          maximum: 500
        required: false
        description: Deprecated alias for `per` (transitional, for the unaudited Discord
          bot).
      - name: offset
        in: query
        schema:
          type: integer
          minimum: 0
        required: false
        description: Deprecated; converted to a page number (transitional, for the
          unaudited Discord bot).
      responses:
        '200':
          description: collections list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      "$ref": "#/components/schemas/CollectionEntry"
                  meta:
                    "$ref": "#/components/schemas/PaginationMeta"
        '401':
          description: unauthenticated
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
    post:
      summary: Create a collection entry
      tags:
      - Collections
      description: 'Adds a game to the user''s collection. `gamedb_game_id` and `ownership_type`
        are required. NOTE: unlike the other user-game lists (backlog/favorites/…),
        collection writes are currently NOT owner-restricted — any authenticated caller
        may write to any `user_id` (tracked by the controller-hardening companion
        issue). The created entry is always scoped to the path `user_id`. Returns
        the full record (all columns, including `is_shared` and timestamps) plus the
        joined platform name/abbreviation.'
      parameters: []
      responses:
        '201':
          description: collection entry created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    "$ref": "#/components/schemas/CollectionEntryDetail"
        '422':
          description: validation failed
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
        '400':
          description: missing `data` parameter
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
        '401':
          description: unauthenticated
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  properties:
                    gamedb_game_id:
                      type: integer
                      description: The game (gamedb_games.game_id). Required on create.
                    ownership_type:
                      type: string
                      description: How the game is owned (e.g. "physical", "digital").
                        Required on create.
                    platform_id:
                      type: integer
                      nullable: true
                      description: Optional platform association.
                    note:
                      type: string
                      nullable: true
                      description: Optional free-text note.
                    is_shared:
                      type: boolean
                      description: Whether the entry is shared. Optional; defaults
                        to false.
                  required:
                  - gamedb_game_id
                  - ownership_type
              required:
              - data
        required: true
