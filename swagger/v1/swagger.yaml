  "/api/v1/dashboard":
    get:
      summary: Front-page dashboard
      tags:
      - Dashboard
      description: Returns the most recent Game of the Month (GOTM) and Non-Retro
        GOTM entries used to populate the front page.
      parameters:
      - name: limit
        in: query
        schema:
          type: integer
          minimum: 1
          maximum: 20
          default: 10
        required: false
        description: Number of entries to return for each list (default 10, max 20).
      responses:
        '200':
          description: dashboard payload
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      gotm:
                        type: array
                        items:
                          type: object
                          additionalProperties: true
                      nr_gotm:
                        type: array
                        items:
                          type: object
                          additionalProperties: true
                  meta:
                    type: object
                    properties:
                      limit:
                        type: integer
                        example: 10
        '401':
          description: unauthenticated
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
