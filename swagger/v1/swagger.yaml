security:
- bearerAuth: []
paths:
  "/api/v1/users/{user_id}/backlog":
    parameters:
    - name: user_id
      in: path
      schema:
        type: string
      required: true
    get:
      summary: List a user's backlog
      tags:
      - Backlog
      description: Ordered by `sort_order` ascending then `created_at` descending.
        Open to any authenticated caller.
      parameters:
      - name: page
        in: query
        schema:
          type: integer
          default: 1
          minimum: 1
        required: false
      - name: per
        in: query
        schema:
          type: integer
          default: 50
          maximum: 500
        required: false
      - name: limit
        in: query
        schema:
          type: integer
          maximum: 500
        required: false
        description: Deprecated alias for `per` (transitional, for the unaudited Discord
          bot).
      - name: offset
        in: query
        schema:
          type: integer
          minimum: 0
        required: false
        description: Deprecated; converted to a page number (transitional, for the
          unaudited Discord bot).
      responses:
        '200':
          description: backlog list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      "$ref": "#/components/schemas/BacklogEntry"
                  meta:
                    "$ref": "#/components/schemas/PaginationMeta"
        '401':
          description: unauthenticated
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
    post:
      summary: Add to backlog
      tags:
      - Backlog
      description: Owner-only (a Discord caller may only write their own backlog;
        the bot service token may write any). `gamedb_game_id` is required; `platform_id`,
        `sort_order` and `note` are optional.
      parameters: []
      responses:
        '201':
          description: backlog entry created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    "$ref": "#/components/schemas/BacklogEntry"
        '403':
          description: forbidden — caller is not the owner
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
        '422':
          description: validation failed
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
        '400':
          description: missing `data` parameter
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
        '401':
          description: unauthenticated
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  properties:
                    gamedb_game_id:
                      type: integer
                      description: The game (gamedb_games.game_id) to add. Required
                        on create.
                    platform_id:
                      type: integer
                      nullable: true
                      description: Optional platform association.
                    sort_order:
                      type: integer
                      nullable: true
                      description: Optional manual sort position.
                    note:
                      type: string
                      nullable: true
                      description: Optional free-text note.
                  required:
                  - gamedb_game_id
              required:
              - data
        required: true
  "/api/v1/backlog/{id}":
    parameters:
    - name: id
      in: path
      schema:
        type: string
      required: true
      description: UserGameBacklog entry_id.
    get:
      summary: Show a backlog entry
      tags:
      - Backlog
      responses:
        '200':
          description: backlog entry
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    "$ref": "#/components/schemas/BacklogEntry"
        '404':
          description: not found
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
        '401':
          description: unauthenticated
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
    patch:
      summary: Update a backlog entry
      tags:
      - Backlog
      description: 'Owner-only. Partial update: send any subset of the writable columns.'
      parameters: []
      responses:
        '200':
          description: updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    "$ref": "#/components/schemas/BacklogEntry"
        '403':
          description: forbidden — caller is not the owner
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
        '404':
          description: not found
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
        '422':
          description: validation failed
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
        '401':
          description: unauthenticated
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  properties:
                    gamedb_game_id:
                      type: integer
                      description: The game (gamedb_games.game_id) to add. Required
                        on create.
                    platform_id:
                      type: integer
                      nullable: true
                      description: Optional platform association.
                    sort_order:
                      type: integer
                      nullable: true
                      description: Optional manual sort position.
                    note:
                      type: string
                      nullable: true
                      description: Optional free-text note.
              required:
              - data
        required: true
    put:
      summary: Replace a backlog entry (alias)
      tags:
      - Backlog
      description: Owner-only. Alias for PATCH (the update is applied as a partial
        assign).
      parameters: []
      responses:
        '200':
          description: updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    "$ref": "#/components/schemas/BacklogEntry"
        '401':
          description: unauthenticated
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  properties:
                    gamedb_game_id:
                      type: integer
                      description: The game (gamedb_games.game_id) to add. Required
                        on create.
                    platform_id:
                      type: integer
                      nullable: true
                      description: Optional platform association.
                    sort_order:
                      type: integer
                      nullable: true
                      description: Optional manual sort position.
                    note:
                      type: string
                      nullable: true
                      description: Optional free-text note.
        required: true
    delete:
      summary: Delete a backlog entry
      tags:
      - Backlog
      description: Owner-only.
      responses:
        '200':
          description: deleted
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/DeletedResponse"
        '403':
          description: forbidden — caller is not the owner
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
        '404':
          description: not found
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
        '401':
          description: unauthenticated
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
  "/api/v1/users/{user_id}/collections":
    parameters:
    - name: user_id
      in: path
      schema:
        type: string
      required: true
      description: Owning RpgClubUser id.
    get:
      summary: List a user's collections
      tags:
      - Collections
      description: Open to any authenticated caller.
      parameters:
      - name: page
        in: query
