  "/api/v1/session":
    get:
      summary: Current session
      tags:
      - Sessions
      description: Returns the authenticated principal (Discord user or service account)
        and, when applicable, RPG Club membership info.
      responses:
        '200':
          description: current session
          content:
            application/json:
              schema:
                type: object
                properties:
                  principal:
                    type: object
                    description: The authenticated principal (Auth::Principal#as_json).
                      `kind` is "discord_user" or "service"; the name/avatar fields
                      are null for a service principal.
                    properties:
                      kind:
                        type: string
                        example: discord_user
                      id:
                        type: string
                      discord_id:
                        type: string
                        nullable: true
                      username:
                        type: string
                        nullable: true
                      global_name:
                        type: string
                        nullable: true
                      avatar:
                        type: string
                        nullable: true
                      service:
                        type: boolean
                      dev:
                        type: boolean
                      longstanding:
                        type: boolean
                    required:
                    - kind
                    - id
                    - service
                    - dev
                    - longstanding
                  membership:
                    type: object
                    nullable: true
                    description: RPG Club membership flags (RpgClubUser#membership)
                      merged with the caller's dev/longstanding flags. Null for a
                      service principal or an unknown user.
                    properties:
                      admin:
                        type: boolean
                      moderator:
                        type: boolean
                      regular:
                        type: boolean
                      member:
                        type: boolean
                      newcomer:
                        type: boolean
                      active:
                        type: boolean
                      dev:
                        type: boolean
                      longstanding:
                        type: boolean
                required:
                - principal
        '401':
          description: unauthenticated
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
