  "/api/v1/games/{id}/release_announcements":
    parameters:
    - name: id
      in: path
      schema:
        type: string
      required: true
      description: GamedbGame game_id.
    get:
      summary: List a game's scheduled release announcements
      tags:
      - Release Announcements
      description: The scheduled announcements for the game's releases, ordered by
        `announce_at`. Each row is keyed by `release_id` (1:1 with a release). The
        delivery columns (`sent_at`, `skipped_at`, `skip_reason`) are bot-managed
        and read-only.
      parameters:
      - name: page
        in: query
        schema:
          type: integer
          default: 1
          minimum: 1
        required: false
      - name: per
        in: query
        schema:
          type: integer
          default: 50
          maximum: 500
        required: false
      responses:
        '200':
          description: release announcements list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      "$ref": "#/components/schemas/ReleaseAnnouncement"
                  meta:
                    "$ref": "#/components/schemas/PaginationMeta"
        '401':
          description: unauthenticated
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
    patch:
      summary: Bulk-sync a game's release announcement schedule
      tags:
      - Release Announcements
      description: Admin/service-only. Rebuilds the game's announcement schedule from
        its releases and applies canonicality (the bot's `syncReleaseAnnouncements`
        + `markNonCanonicalAnnouncements`). Server-side and body-less — everything
        is computed from `gamedb_releases`. In one transaction it (1) upserts an announcement
        for every release with a `release_date`, scheduling `announce_at = release_date
        - 7 days` (a pending row is moved only when its time changes; rows already
        sent/skipped are left alone); (2) clears the canonicality skip on rows that
        no longer qualify as port-only / same-day-duplicate; and (3) skips rows that
        are now non-canonical (`port-only-release` for a later release date, `same-day-platform-duplicate`
        for a same-day tie).
      responses:
        '200':
          description: schedule synced
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      upserted:
                        type: integer
                        description: Announcements inserted or moved.
                      restored:
                        type: integer
                        description: Rows whose canonicality skip was cleared.
                      skipped:
                        type: integer
                        description: Rows newly marked non-canonical (skipped).
                    required:
                    - upserted
                    - restored
                    - skipped
        '403':
          description: forbidden — caller is not an admin or service
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
        '401':
          description: unauthenticated
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
    put:
      summary: Bulk-sync a game's release announcement schedule (alias)
      tags:
      - Release Announcements
      description: Admin/service-only. Alias for PATCH.
      responses:
        '200':
          description: schedule synced
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      upserted:
                        type: integer
                      restored:
                        type: integer
                      skipped:
                        type: integer
                    required:
                    - upserted
                    - restored
                    - skipped
        '401':
          description: unauthenticated
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
  "/api/v1/release_announcements/due":
    get:
      summary: List release announcements that are due to post
      tags:
      - Release Announcements
      description: 'Service-only poll feed (the bot''s `listDueAnnouncements`). Returns
        the announcements ready to post: not yet sent or skipped, whose `announce_at`
        has passed, whose release is still in the future, and which are the canonical
        release for their game (earliest release date; on a same-day tie the lowest
        `release_id`). Any pending announcement whose window has already passed (its
        release has shipped) is marked skipped (`release-window-missed`) server-side
        first, so it never appears here. Unpaginated; bounded by `limit`.'
      parameters:
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          default: 25
          minimum: 1
          maximum: 100
        description: Max rows to return (default 25, clamped to 100).
      responses:
        '200':
          description: due announcements
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      "$ref": "#/components/schemas/DueReleaseAnnouncement"
                required:
                - data
        '403':
          description: forbidden — caller is not a service
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
        '401':
          description: unauthenticated
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
