---
openapi: 3.0.1
info:
  title: The RPG Club API
  version: v1
  description: Backend API for The RPG Club. Authentication is performed with a bearer
    `UserSessionToken` issued after Discord OAuth, or a service token for the bot.
servers:
- url: "{host}"
  description: Development
  variables:
    host:
      default: http://localhost:3000
- url: "{host}"
  description: Production
  variables:
    host:
      default: https://api.example.com
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: UserSessionToken
      description: Bearer token issued by `POST /auth/discord/callback` (user session)
        or the service-account token used by the Discord bot.
  schemas:
    Error:
      type: object
      properties:
        error:
          type: string
          example: not_found
        message:
          type: string
          example: Couldn't find Record with id=42
      required:
      - error
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
          example: 1
        pages:
          type: integer
          example: 5
        count:
          type: integer
          example: 123
        per:
          type: integer
          example: 50
        prev:
          type: integer
          example:
          nullable: true
        next:
          type: integer
          example: 2
          nullable: true
      required:
      - page
      - pages
      - count
      - per
      description: Page-native pagination metadata (from pagy).
    DeletedResponse:
      type: object
      properties:
        deleted:
          type: boolean
          example: true
      required:
      - deleted
    DeletedCountResponse:
      type: object
      properties:
        deleted:
          type: boolean
          example: true
        count:
          type: integer
          example: 3
      required:
      - deleted
      - count
    Company:
      type: object
      properties:
        company_id:
          type: integer
        name:
          type: string
        igdb_company_id:
          type: integer
          nullable: true
      required:
      - company_id
      - name
    Franchise:
      type: object
      properties:
        franchise_id:
          type: integer
        name:
          type: string
        igdb_franchise_id:
          type: integer
          nullable: true
      required:
      - franchise_id
      - name
    Genre:
      type: object
      properties:
        genre_id:
          type: integer
        name:
          type: string
        igdb_genre_id:
          type: integer
          nullable: true
      required:
      - genre_id
      - name
    Engine:
      type: object
      properties:
        engine_id:
          type: integer
        name:
          type: string
        igdb_engine_id:
          type: integer
          nullable: true
      required:
      - engine_id
      - name
    Mode:
      type: object
      properties:
        mode_id:
          type: integer
        name:
          type: string
        igdb_game_mode_id:
          type: integer
          nullable: true
      required:
      - mode_id
      - name
    Perspective:
      type: object
      properties:
        perspective_id:
          type: integer
        name:
          type: string
        igdb_perspective_id:
          type: integer
          nullable: true
      required:
      - perspective_id
      - name
    Theme:
      type: object
      properties:
        theme_id:
          type: integer
        name:
          type: string
        igdb_theme_id:
          type: integer
          nullable: true
      required:
      - theme_id
      - name
    Region:
      type: object
      properties:
        region_id:
          type: integer
        region_code:
          type: string
        region_name:
          type: string
        igdb_region_id:
          type: integer
          nullable: true
      required:
      - region_id
      - region_code
      - region_name
    Collection:
      type: object
      properties:
        collection_id:
          type: integer
        name:
          type: string
      required:
      - collection_id
      - name
    Platform:
      type: object
      properties:
        platform_id:
          type: integer
        platform_code:
          type: string
        platform_name:
          type: string
        platform_abbreviation:
          type: string
          nullable: true
        igdb_platform_id:
          type: integer
          nullable: true
      required:
      - platform_id
      - platform_code
      - platform_name
    PlatformDetail:
      type: object
      properties:
        platform_id:
          type: integer
        platform_code:
          type: string
        platform_name:
          type: string
        igdb_platform_id:
          type: integer
          nullable: true
        platform_abbreviation:
          type: string
          nullable: true
        platform_slug:
          type: string
          nullable: true
        platform_checksum:
          type: string
          nullable: true
        igdb_updated_at:
          type: integer
          nullable: true
      required:
      - platform_id
      - platform_code
      - platform_name
    SocialPlatform:
      type: object
      properties:
        id:
          type: integer
        label:
          type: string
        position:
          type: integer
        created_by_user_id:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required:
      - id
      - label
      - position
      - created_at
      - updated_at
    GameSummary:
      type: object
      properties:
        game_id:
          type: integer
        title:
          type: string
        description:
          type: string
          nullable: true
        igdb_id:
          type: integer
          nullable: true
        slug:
          type: string
          nullable: true
        igdb_url:
          type: string
          nullable: true
        initial_release_date:
          type: string
          format: date-time
          nullable: true
        cover_url:
          type: string
          nullable: true
        art_url:
          type: string
          nullable: true
        logo_url:
          type: string
          nullable: true
      required:
      - game_id
      - title
    Game:
      allOf:
      - "$ref": "#/components/schemas/GameSummary"
      - type: object
        properties:
          gotm_won:
            type: boolean
          nr_gotm_won:
            type: boolean
        required:
        - gotm_won
        - nr_gotm_won
    GameImage:
      type: object
      properties:
        image_id:
          type: integer
        game_id:
          type: integer
        kind:
          type: string
        object_key:
          type: string
        uploaded_by_user_id:
          type: string
          nullable: true
        is_primary:
          type: boolean
        position:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        url:
          type: string
      required:
      - image_id
      - game_id
      - kind
      - object_key
      - is_primary
      - position
      - created_at
      - updated_at
      - url
    Release:
      type: object
      properties:
        release_id:
          type: integer
        game_id:
          type: integer
        platform_id:
          type: integer
        region_id:
          type: integer
        format:
          type: string
          nullable: true
        release_date:
          type: string
          format: date-time
          nullable: true
        notes:
          type: string
          nullable: true
        platform_code:
          type: string
        platform_name:
          type: string
        region_code:
          type: string
        region_name:
          type: string
      required:
      - release_id
      - game_id
      - platform_id
      - region_id
      - platform_code
      - platform_name
      - region_code
      - region_name
    GameCompany:
      type: object
      properties:
        company_id:
          type: integer
        name:
          type: string
        igdb_company_id:
          type: integer
          nullable: true
        role:
          type: string
      required:
      - company_id
      - name
      - role
    ReleaseAnnouncement:
      type: object
      properties:
        release_id:
          type: integer
        announce_at:
          type: string
          format: date-time
        sent_at:
          type: string
          format: date-time
          nullable: true
        skipped_at:
          type: string
          format: date-time
          nullable: true
        skip_reason:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required:
      - release_id
      - announce_at
      - created_at
      - updated_at
    DueReleaseAnnouncement:
      type: object
      properties:
        id:
          type: integer
        release_id:
          type: integer
        game_id:
          type: integer
        title:
          type: string
        release_date:
          type: string
          format: date-time
        announce_at:
          type: string
          format: date-time
        platform_name:
          type: string
          nullable: true
        platform_abbreviation:
          type: string
          nullable: true
        igdb_url:
          type: string
          nullable: true
      required:
      - id
      - release_id
      - game_id
      - title
      - release_date
      - announce_at
    UserSummary:
      type: object
      properties:
        user_id:
          type: string
        username:
          type: string
          nullable: true
        global_name:
          type: string
          nullable: true
        is_bot:
          type: boolean
        role_admin:
          type: boolean
        role_moderator:
          type: boolean
        role_regular:
          type: boolean
        server_left_at:
          type: string
          format: date-time
          nullable: true
      required:
      - user_id
      - is_bot
      - role_admin
      - role_moderator
      - role_regular
    Membership:
      type: object
      properties:
        admin:
          type: boolean
        moderator:
          type: boolean
        regular:
          type: boolean
        member:
          type: boolean
        newcomer:
          type: boolean
        active:
          type: boolean
      required:
      - admin
      - moderator
      - regular
      - member
      - newcomer
      - active
    UserSocial:
      type: object
      properties:
        id:
          type: integer
        user_id:
          type: string
        platform_id:
          type: integer
        display_text:
          type: string
          nullable: true
        url:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        social_platform:
          "$ref": "#/components/schemas/SocialPlatform"
      required:
      - id
      - user_id
      - platform_id
      - created_at
      - updated_at
    UserCounts:
      type: object
      properties:
        now_playing:
          type: integer
        favorites:
          type: integer
        reviews:
          type: integer
        completions:
          type: integer
        backlog:
          type: integer
        collections:
          type: integer
        journal:
          type: integer
      required:
      - now_playing
      - favorites
      - reviews
      - completions
      - backlog
      - collections
      - journal
    User:
      allOf:
      - "$ref": "#/components/schemas/UserSummary"
      - type: object
        properties:
          membership:
            "$ref": "#/components/schemas/Membership"
          socials:
            type: array
            items:
              "$ref": "#/components/schemas/UserSocial"
          now_playing:
            type: array
            items:
              "$ref": "#/components/schemas/NowPlayingEntry"
          favorites:
            type: array
            items:
              "$ref": "#/components/schemas/FavoriteEntry"
          reviews:
            type: array
            items:
              "$ref": "#/components/schemas/ReviewEntry"
          completions:
            type: array
            items:
              "$ref": "#/components/schemas/CompletionEntry"
          journal:
            type: array
            items:
              "$ref": "#/components/schemas/JournaledGame"
          counts:
            "$ref": "#/components/schemas/UserCounts"
    UserWithSocials:
      allOf:
      - "$ref": "#/components/schemas/UserSummary"
      - type: object
        properties:
          socials:
            type: array
            items:
              "$ref": "#/components/schemas/UserSocial"
    UserService:
      allOf:
      - "$ref": "#/components/schemas/UserSummary"
      - type: object
        properties:
          server_joined_at:
            type: string
            format: date-time
            nullable: true
          last_seen_at:
            type: string
            format: date-time
            nullable: true
          emoji_name:
            type: string
            nullable: true
    MarkDepartedResult:
      type: object
      properties:
        count:
          type: integer
      required:
      - count
      description: Number of users newly marked departed.
    BacklogEntry:
      type: object
      properties:
        entry_id:
          type: integer
        user_id:
          type: string
        gamedb_game_id:
          type: integer
        platform_id:
          type: integer
          nullable: true
        note:
          type: string
          nullable: true
        game:
          "$ref": "#/components/schemas/GameSummary"
        platform:
          allOf:
          - "$ref": "#/components/schemas/Platform"
          nullable: true
      required:
      - entry_id
      - user_id
      - gamedb_game_id
    CollectionEntry:
      type: object
      properties:
        entry_id:
          type: integer
        user_id:
          type: string
        gamedb_game_id:
          type: integer
        platform_id:
          type: integer
          nullable: true
        ownership_type:
          type: string
        note:
          type: string
          nullable: true
        platform_name:
          type: string
          nullable: true
        platform_abbreviation:
          type: string
          nullable: true
      required:
      - entry_id
      - user_id
      - gamedb_game_id
      - ownership_type
    CollectionUserEntry:
      type: object
      properties:
        entry_id:
          type: integer
        user_id:
          type: string
        gamedb_game_id:
          type: integer
        platform_id:
          type: integer
          nullable: true
        ownership_type:
          type: string
        note:
          type: string
          nullable: true
        platform_name:
          type: string
          nullable: true
        platform_abbreviation:
          type: string
          nullable: true
        user:
          "$ref": "#/components/schemas/UserSummary"
      required:
      - entry_id
      - user_id
      - gamedb_game_id
      - ownership_type
    CollectionEntryDetail:
      type: object
      properties:
        entry_id:
          type: integer
        user_id:
          type: string
        gamedb_game_id:
          type: integer
        platform_id:
          type: integer
          nullable: true
        ownership_type:
          type: string
        note:
          type: string
          nullable: true
        platform_name:
          type: string
          nullable: true
        platform_abbreviation:
          type: string
          nullable: true
        is_shared:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required:
      - entry_id
      - user_id
      - gamedb_game_id
      - ownership_type
      - is_shared
      - created_at
      - updated_at
    CollectionPlatformCount:
      type: object
      properties:
        platform_id:
          type: integer
          nullable: true
        platform_name:
          type: string
          nullable: true
        platform_abbreviation:
          type: string
          nullable: true
        count:
          type: integer
      required:
      - count
    CollectionPlatformSummary:
      type: object
      properties:
        total_count:
          type: integer
        platform_counts:
          type: array
          items:
            "$ref": "#/components/schemas/CollectionPlatformCount"
      required:
      - total_count
    CompletionEntry:
      type: object
      properties:
        completion_id:
          type: integer
        user_id:
          type: string
        gamedb_game_id:
          type: integer
        platform_id:
          type: integer
          nullable: true
        note:
          type: string
          nullable: true
        completion_type:
          type: string
        completed_at:
          type: string
          format: date-time
          nullable: true
        final_playtime_hrs:
          type: number
          nullable: true
        created_at:
          type: string
          format: date-time
        game:
          "$ref": "#/components/schemas/GameSummary"
        platform:
          allOf:
          - "$ref": "#/components/schemas/Platform"
          nullable: true
      required:
      - completion_id
      - user_id
      - gamedb_game_id
      - completion_type
      - created_at
    CompletionUserEntry:
      type: object
      properties:
        completion_id:
          type: integer
        user_id:
          type: string
        gamedb_game_id:
          type: integer
        platform_id:
          type: integer
          nullable: true
        note:
          type: string
          nullable: true
        completion_type:
          type: string
        completed_at:
          type: string
          format: date-time
          nullable: true
        final_playtime_hrs:
          type: number
          nullable: true
        created_at:
          type: string
          format: date-time
        user:
          "$ref": "#/components/schemas/UserSummary"
