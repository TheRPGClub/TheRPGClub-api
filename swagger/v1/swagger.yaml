                "$ref": "#/components/schemas/Error"
        '404':
          description: thread not found
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
        '401':
          description: unauthenticated
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  properties:
                    forum_channel_id:
                      type: string
                      description: The forum channel the thread lives in.
                    thread_name:
                      type: string
                      description: Thread title.
                    is_archived:
                      type: string
                      description: Archived flag, stored as a string (e.g. "true"/"false").
                    last_seen_at:
                      type: string
                      format: date-time
                      nullable: true
                      description: When the bot last saw the thread.
