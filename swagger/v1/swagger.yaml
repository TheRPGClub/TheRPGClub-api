  "/api/v1/search_synonyms":
    get:
      summary: List search synonym terms
      tags:
      - Search Synonyms
      description: Game-search synonym terms. Pass `group_id` to list the terms in
        one synonym group, `term` for an exact normalised-key lookup (synonym expansion),
        or `q` for a free-text search.
      parameters:
      - name: group_id
        in: query
        schema:
          type: integer
        required: false
        description: Filter to a single synonym group.
      - name: term
        in: query
        schema:
          type: string
        required: false
        description: Exact-match lookup on the normalised key (`term_norm`). The value
          is normalised server-side (lowercased, non-alphanumerics stripped) before
          matching, so `ff7`, `FF7` and `FF-7` are equivalent. Drives game-search
          synonym expansion.
      - name: q
        in: query
        schema:
          type: string
        required: false
        description: 'Free-text search: matches `term_text` case-insensitively and
          the normalised `term_norm` by substring.'
      - name: page
        in: query
        schema:
          type: integer
          default: 1
          minimum: 1
        required: false
      - name: per
        in: query
        schema:
          type: integer
          default: 50
          maximum: 500
        required: false
      - name: limit
        in: query
        schema:
          type: integer
          maximum: 500
        required: false
        description: Deprecated alias for `per` (transitional, for the unaudited Discord
          bot).
      - name: offset
        in: query
        schema:
          type: integer
          minimum: 0
        required: false
        description: Deprecated; converted to a page number (transitional, for the
          unaudited Discord bot).
      responses:
        '200':
          description: synonym terms
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      "$ref": "#/components/schemas/SearchSynonym"
                  meta:
                    "$ref": "#/components/schemas/PaginationMeta"
        '401':
          description: unauthenticated
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
    post:
      summary: Create a synonym term
      tags:
      - Search Synonyms
      description: Restricted to admins or the service account. The caller supplies
        `term_norm` (the normalised lookup key); it is not derived server-side.
      parameters: []
      responses:
        '201':
          description: term created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    "$ref": "#/components/schemas/SearchSynonym"
        '403':
          description: forbidden — admin or service required
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
        '422':
          description: validation failed
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
        '401':
          description: unauthenticated
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  properties:
                    group_id:
                      type: integer
                      description: Synonym group this term belongs to. Required on
                        create.
                    term_text:
                      type: string
                      description: The synonym term. Required on create.
                    term_norm:
                      type: string
                      description: Normalised lookup key (caller-supplied). Required
                        on create.
                    created_by:
                      type: string
                      nullable: true
                      description: Optional creator id.
                  required:
                  - group_id
                  - term_text
                  - term_norm
              required:
              - data
        required: true
