---
openapi: 3.0.1
info:
  title: The RPG Club API
  version: v1
  description: Backend API for The RPG Club. Authentication is performed with a bearer
    `UserSessionToken` issued after Discord OAuth, or a service token for the bot.
servers:
- url: "{host}"
  description: Development
  variables:
    host:
      default: http://localhost:3000
- url: "{host}"
  description: Production
  variables:
    host:
      default: https://api.example.com
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: UserSessionToken
      description: Bearer token issued by `POST /auth/discord/callback` (user session)
        or the service-account token used by the Discord bot.
  schemas:
    Error:
      type: object
      properties:
        error:
          type: string
          example: not_found
        message:
          type: string
          example: Couldn't find Record with id=42
      required:
      - error
    PaginationMeta:
      type: object
      description: Page-native pagination metadata (from pagy).
      properties:
        page:
          type: integer
          example: 1
        pages:
          type: integer
          example: 5
        count:
          type: integer
          example: 123
        per:
          type: integer
          example: 50
        prev:
          type: integer
          example:
          nullable: true
        next:
          type: integer
          example: 2
          nullable: true
      required:
      - page
      - pages
      - count
      - per
    DeletedResponse:
      type: object
      properties:
        deleted:
          type: boolean
          example: true
      required:
      - deleted
security:
- bearerAuth: []
paths:
  "/api/v1/users/{user_id}/backlog":
    parameters:
    - name: user_id
      in: path
      schema:
        type: string
      required: true
    get:
      summary: List a user's backlog
      tags:
      - Backlog
      description: Ordered by `sort_order` ascending then `created_at` descending.
      parameters:
      - name: page
        in: query
        schema:
          type: integer
          default: 1
          minimum: 1
        required: false
      - name: per
        in: query
        schema:
          type: integer
          default: 50
          maximum: 500
        required: false
      - name: limit
        in: query
        schema:
          type: integer
          maximum: 500
        required: false
        description: Deprecated alias for `per` (transitional, for the unaudited Discord
          bot).
      - name: offset
        in: query
        schema:
          type: integer
          minimum: 0
        required: false
        description: Deprecated; converted to a page number (transitional, for the
          unaudited Discord bot).
      responses:
        '200':
          description: backlog list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
                  meta:
                    "$ref": "#/components/schemas/PaginationMeta"
        '401':
          description: unauthenticated
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
    post:
      summary: Add to backlog
      tags:
      - Backlog
      description: Owner-only.
      parameters: []
      responses:
        '201':
          description: backlog entry created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    additionalProperties: true
        '403':
          description: forbidden — caller is not the owner
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
        '422':
          description: validation failed
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
        '400':
          description: missing `data` parameter
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
        '401':
          description: unauthenticated
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  additionalProperties: true
                  description: UserGameBacklog attributes (`gamedb_game_id`, `platform_id`,
                    `sort_order`, `notes`).
              required:
              - data
        required: true
  "/api/v1/backlog/{id}":
