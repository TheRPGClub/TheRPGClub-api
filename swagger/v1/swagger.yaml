  "/api/v1/suggestions/review_sessions":
    get:
      summary: List suggestion review sessions
      tags:
      - Suggestion Review Sessions
      description: Lists review sessions, newest first. Pass `reviewer_id` to scope
        the list to a single reviewer. `suggestion_ids` is returned verbatim as the
        stored JSON string.
      parameters:
      - name: reviewer_id
        in: query
        schema:
          type: string
        required: false
        description: Filter to one reviewer (Discord user id).
      - name: page
        in: query
        schema:
          type: integer
          default: 1
          minimum: 1
        required: false
      - name: per
        in: query
        schema:
          type: integer
          default: 50
          maximum: 500
        required: false
      - name: limit
        in: query
        schema:
          type: integer
          maximum: 500
        required: false
        description: Deprecated alias for `per` (transitional, for the unaudited Discord
          bot).
      - name: offset
        in: query
        schema:
          type: integer
          minimum: 0
        required: false
        description: Deprecated; converted to a page number (transitional, for the
          unaudited Discord bot).
      responses:
        '200':
          description: review sessions list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      "$ref": "#/components/schemas/SuggestionReviewSession"
                  meta:
                    "$ref": "#/components/schemas/PaginationMeta"
        '401':
          description: unauthenticated
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
    post:
      summary: Create a review session
      tags:
      - Suggestion Review Sessions
      description: Admin/service-only. Creates a review session. The body carries
        `session_id`, `reviewer_id`, `suggestion_ids` (a JSON string of suggestion
        ids), `current_index`, and `total_count`.
      parameters: []
      responses:
        '201':
          description: review session created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    "$ref": "#/components/schemas/SuggestionReviewSession"
        '403':
          description: forbidden — caller is not an admin or service
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
        '422':
          description: validation failed
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
        '400':
          description: missing `data` parameter
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
        '401':
          description: unauthenticated
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  properties:
                    session_id:
                      type: string
                      description: Client-supplied session id (primary key). Required
                        on create.
                    reviewer_id:
                      type: string
                      description: Reviewer (Discord user id). Required on create.
                    suggestion_ids:
                      type: string
                      description: JSON-encoded array of suggestion ids under review,
                        stored and returned verbatim. Required on create.
                    current_index:
                      type: integer
                      description: Reviewer progress index. Optional; defaults to
                        0.
                    total_count:
                      type: integer
                      description: Total suggestions in the session. Optional; defaults
                        to 0.
                  required:
                  - session_id
                  - reviewer_id
                  - suggestion_ids
              required:
              - data
        required: true
    delete:
      summary: Delete all review sessions for a reviewer
      tags:
      - Suggestion Review Sessions
      description: Admin/service-only. Deletes every review session belonging to a
        reviewer. `reviewer_id` is required.
      parameters:
      - name: reviewer_id
        in: query
        schema:
          type: string
        required: true
        description: The reviewer (Discord user id) whose sessions are removed.
      responses:
        '200':
          description: deleted
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/DeletedCountResponse"
        '403':
          description: forbidden — caller is not an admin or service
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
        '400':
          description: missing `reviewer_id`
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
        '401':
          description: unauthenticated
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
  "/api/v1/suggestions/review_sessions/expired":
    delete:
      summary: Prune expired review sessions
      tags:
      - Suggestion Review Sessions
      description: Service-only maintenance route. Deletes sessions created before
        the cutoff. The cutoff is the optional `before` (ISO-8601) param; when absent
        it defaults to the bot's 15-minute TTL.
      parameters:
      - name: before
        in: query
        schema:
          type: string
          format: date-time
        required: false
        description: ISO-8601 cutoff; sessions created before this are deleted. Defaults
          to 15 minutes ago.
      responses:
        '200':
          description: pruned
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/DeletedCountResponse"
        '403':
