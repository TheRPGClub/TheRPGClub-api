        user_id:
          type: string
        username:
          type: string
          nullable: true
        global_name:
          type: string
          nullable: true
        completion_count:
          type: integer
      required:
      - user_id
      - completion_count
    FavoriteEntry:
      type: object
      properties:
        entry_id:
          type: integer
        user_id:
          type: string
        gamedb_game_id:
          type: integer
        note:
          type: string
          nullable: true
        game:
          "$ref": "#/components/schemas/GameSummary"
      required:
      - entry_id
      - user_id
      - gamedb_game_id
    NowPlayingGame:
      allOf:
      - "$ref": "#/components/schemas/GameSummary"
      - type: object
        properties:
          linked_thread_id:
            type: string
            nullable: true
    NowPlayingEntry:
      type: object
      properties:
        entry_id:
          type: integer
        user_id:
          type: string
        gamedb_game_id:
          type: integer
          nullable: true
        platform_id:
          type: integer
          nullable: true
        note:
          type: string
          nullable: true
        sort_order:
          type: integer
          nullable: true
        added_at:
          type: string
          format: date-time
        note_updated_at:
          type: string
          format: date-time
          nullable: true
        has_journal_entry:
          type: boolean
        journal_count:
          type: integer
        last_journal_at:
          type: string
          format: date-time
          nullable: true
        game:
          allOf:
          - "$ref": "#/components/schemas/NowPlayingGame"
          nullable: true
        platform:
          allOf:
          - "$ref": "#/components/schemas/Platform"
          nullable: true
      required:
      - entry_id
      - user_id
      - added_at
      - has_journal_entry
      - journal_count
    NowPlayingUserEntry:
      type: object
      properties:
        entry_id:
          type: integer
        user_id:
          type: string
        gamedb_game_id:
          type: integer
          nullable: true
        platform_id:
          type: integer
          nullable: true
        note:
          type: string
          nullable: true
        sort_order:
          type: integer
          nullable: true
        added_at:
          type: string
          format: date-time
        note_updated_at:
          type: string
          format: date-time
          nullable: true
        has_journal_entry:
          type: boolean
        journal_count:
          type: integer
        last_journal_at:
          type: string
          format: date-time
          nullable: true
        user:
          "$ref": "#/components/schemas/UserSummary"
