    parameters:
    - name: user_id
      in: path
      schema:
        type: string
      required: true
    get:
      summary: Show a user's presence-prompt opt-out preference
      tags:
      - Presence Prompts
      description: 'The user''s opt-out preference as a single document: `all` (whether
        every game is silenced) plus the list of per-game opt-outs.'
      responses:
        '200':
          description: opt-out preference
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    "$ref": "#/components/schemas/PresencePromptOpts"
        '401':
          description: unauthenticated
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
    put:
      summary: Replace a user's presence-prompt opt-out preference
      tags:
      - Presence Prompts
      description: Owner-only. Replaces the entire opt-out set. `all` toggles the
        silence-everything opt-out; `games` lists titles to silence individually (normalized
        like the bot; blanks and duplicates dropped). An empty or omitted set clears
        the opt-outs (opt back in).
      parameters: []
      responses:
        '200':
          description: updated opt-out preference
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    "$ref": "#/components/schemas/PresencePromptOpts"
        '403':
          description: forbidden — caller is not the owner
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
        '400':
          description: missing `data` parameter
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
        '401':
          description: unauthenticated
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  properties:
                    all:
                      type: boolean
                      description: Opt out of prompts for every game.
                    games:
                      type: array
                      items:
                        type: string
                      description: Game titles to silence individually.
              required:
              - data
        required: true
  "/api/v1/public_reminders":
    get:
      summary: List public reminders
      tags:
      - Public Reminders
      description: Returns reminders the bot will post to the public channel. Pass
        `enabled=true|false` to filter. Open to any authenticated caller.
      parameters:
      - name: enabled
        in: query
        schema:
          type: boolean
        required: false
      - name: page
        in: query
        schema:
          type: integer
          default: 1
          minimum: 1
        required: false
      - name: per
        in: query
        schema:
          type: integer
          default: 50
          maximum: 500
        required: false
      - name: limit
        in: query
        schema:
          type: integer
          maximum: 500
        required: false
