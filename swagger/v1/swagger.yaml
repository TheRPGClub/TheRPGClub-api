                "$ref": "#/components/schemas/Error"
  "/api/v1/threads":
    post:
      summary: Upsert a Discord thread
      tags:
      - Threads
      description: 'Admin/service-only. Upserts a thread by `thread_id` (a Discord
        snowflake): inserts a new row, or on an existing one refreshes only `forum_channel_id`,
        `thread_name`, `is_archived`, `last_seen_at` — `skip_linking` and `created_at`
        are left untouched so a sync sweep can''t clobber them. The derived `gamedb_game_id`
        is ignored on write (managed via the link endpoints).'
      parameters: []
      responses:
        '201':
          description: thread created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    additionalProperties: true
        '200':
          description: existing thread updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    additionalProperties: true
        '403':
          description: forbidden — caller is not an admin or service
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
        '422':
          description: validation failed
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
        '400':
          description: missing `data` or `thread_id`
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
        '401':
          description: unauthenticated
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  additionalProperties: true
                  description: Thread attributes (`thread_id`, `forum_channel_id`,
                    `thread_name`, `is_archived`, `last_seen_at`, `skip_linking`).
              required:
              - data
        required: true
  "/api/v1/threads/{id}":
