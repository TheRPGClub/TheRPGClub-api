  "/api/v1/games/{id}/refresh-releases":
    parameters:
    - name: id
      in: path
      schema:
        type: string
      required: true
    post:
      summary: Refresh releases from IGDB
      tags:
      - Games
      description: 'Admin/service-only. Re-fetches the game''s release dates from
        IGDB and replaces its release rows (the bot''s `refreshReleaseDates`): clears
        the existing releases plus their scheduled announcements, then re-imports
        one release per platform (earliest dated; Japan-only releases skipped, undated
        rows dropped, `format` left null). Returns the rebuilt release list (same
        shape as GET /api/v1/games/{id}/releases).'
      responses:
        '200':
          description: releases refreshed
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      "$ref": "#/components/schemas/Release"
        '403':
          description: forbidden — admin or service required
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
        '404':
          description: game or IGDB game not found
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
        '422':
          description: unprocessable (game has no IGDB id, or IGDB not configured)
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
        '502':
          description: upstream IGDB request failed
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
        '401':
          description: unauthenticated
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
  "/api/v1/games/{id}/alternates":
    parameters:
    - name: id
      in: path
      schema:
        type: string
      required: true
    post:
      summary: Link an alternate version
      tags:
      - Games
      description: Admin/service-only. Links the path game and `alt_game_id` as alternate
        versions of each other (the bot's `linkAlternateVersions`). The link is symmetric
        and stored once; re-linking is idempotent and returns the existing link with
        200. Returns the game's full alternates list (same shape as the `alternates`
        slice of GET /api/v1/games/{id}/relations).
      parameters: []
      responses:
        '201':
          description: alternate linked
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      "$ref": "#/components/schemas/Game"
        '200':
          description: already linked (idempotent)
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      "$ref": "#/components/schemas/Game"
        '403':
          description: forbidden — admin or service required
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
        '404':
          description: game not found
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
        '422':
          description: unprocessable (`alt_game_id` is the game itself, or an unknown
            game)
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
        '400':
          description: missing `data` or `alt_game_id`
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
        '401':
          description: unauthenticated
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  properties:
                    alt_game_id:
                      type: integer
                      description: The other GamedbGame to link as an alternate. Required.
                  required:
                  - alt_game_id
              required:
              - data
        required: true
