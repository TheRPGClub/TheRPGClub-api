  "/api/v1/release_announcements":
    post:
      summary: Schedule a release announcement
      tags:
      - Release Announcements
      description: Admin/service-only. Schedules the bot to announce a release. The
        body carries `release_id` (the primary key, 1:1 with the release) and `announce_at`.
        The delivery columns (`sent_at`, `skipped_at`, `skip_reason`) are bot-managed
        and ignored on write — use the skip action to skip an announcement.
      parameters: []
      responses:
        '201':
          description: announcement scheduled
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    "$ref": "#/components/schemas/ReleaseAnnouncement"
        '403':
          description: forbidden — caller is not an admin or service
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
        '422':
          description: validation failed (missing `announce_at` or unknown `release_id`)
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
        '400':
          description: missing `data` parameter
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
        '401':
          description: unauthenticated
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  properties:
                    release_id:
                      type: integer
                      description: The release to announce (gamedb_releases.release_id;
                        also the PK). Required on create.
                    announce_at:
                      type: string
                      format: date-time
                      description: When to announce. Required on create; move it to
                        reschedule.
                  required:
                  - release_id
                  - announce_at
              required:
              - data
        required: true
