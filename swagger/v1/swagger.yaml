        user_id:
          type: string
        gamedb_game_id:
          type: integer
        rating:
          type: integer
        body:
          type: object
          description: Free-form JSON.
          nullable: true
        created_at:
          type: string
          format: date-time
        game:
          "$ref": "#/components/schemas/GameSummary"
      required:
      - review_id
      - user_id
      - gamedb_game_id
      - rating
      - created_at
    JournalEntryGame:
      type: object
      properties:
        entry_id:
          type: integer
        user_id:
          type: string
        gamedb_game_id:
          type: integer
        entry_title:
          type: string
          nullable: true
        entry_body:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        game:
          "$ref": "#/components/schemas/GameSummary"
      required:
      - entry_id
      - user_id
      - gamedb_game_id
      - entry_body
      - created_at
      - updated_at
    JournalEntryUser:
      type: object
      properties:
        entry_id:
          type: integer
        user_id:
          type: string
        gamedb_game_id:
          type: integer
        entry_title:
          type: string
          nullable: true
        entry_body:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        user:
          "$ref": "#/components/schemas/UserSummary"
      required:
      - entry_id
      - user_id
      - gamedb_game_id
      - entry_body
      - created_at
      - updated_at
