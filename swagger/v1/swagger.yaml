      description: Admin/service-only. Partial update of any mutable column — `skip_linking`,
        `is_archived`, `thread_name`, `last_seen_at`. The PK and derived `gamedb_game_id`
        cannot be changed.
      parameters: []
      responses:
        '200':
          description: thread updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    additionalProperties: true
