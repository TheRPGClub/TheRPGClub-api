  "/api/v1/users/{user_id}/completions":
    parameters:
    - name: user_id
      in: path
      schema:
        type: string
      required: true
    get:
      summary: List a user's completions
      tags:
      - Completions
      description: Ordered by `completed_at` descending, then `created_at` descending.
        Open to any authenticated caller. The optional `game_id`, `year`, `q`, `completed_after`
        and `completed_before` params filter the list (each ANDs in). `meta.count`
        reflects the filtered total, so a count-only caller can request `per=1` and
        read it without fetching every row.
      parameters:
      - name: game_id
        in: query
        schema:
          type: integer
        required: false
        description: Filter to completions of this game (`gamedb_game_id`).
      - name: year
        in: query
        schema:
          type: string
        required: false
        description: Filter by completion year (`YYYY`); the literal `unknown` matches
          entries with no `completed_at`.
      - name: q
        in: query
        schema:
          type: string
        required: false
        description: Filter by game title (case-insensitive substring).
      - name: completed_after
        in: query
        schema:
          type: string
          format: date-time
        required: false
        description: Only completions with `completed_at` on or after this time.
      - name: completed_before
        in: query
        schema:
          type: string
          format: date-time
        required: false
        description: Only completions with `completed_at` on or before this time.
      - name: page
        in: query
        schema:
          type: integer
          default: 1
          minimum: 1
        required: false
      - name: per
        in: query
        schema:
          type: integer
          default: 50
          maximum: 500
        required: false
      - name: limit
        in: query
        schema:
          type: integer
          maximum: 500
        required: false
        description: Deprecated alias for `per` (transitional, for the unaudited Discord
          bot).
      - name: offset
        in: query
        schema:
          type: integer
          minimum: 0
        required: false
        description: Deprecated; converted to a page number (transitional, for the
          unaudited Discord bot).
      responses:
        '200':
          description: completions list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      "$ref": "#/components/schemas/CompletionEntry"
                  meta:
                    "$ref": "#/components/schemas/PaginationMeta"
        '401':
          description: unauthenticated
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
    post:
      summary: Record a completion
      tags:
      - Completions
      description: Owner-only. `gamedb_game_id` and `completion_type` are required;
        `completed_at`, `final_playtime_hrs`, `platform_id` and `note` are optional.
      parameters: []
      responses:
        '201':
          description: completion created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    "$ref": "#/components/schemas/CompletionEntry"
        '403':
          description: forbidden — caller is not the owner
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
        '422':
          description: validation failed
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
        '400':
          description: missing `data` parameter
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
        '401':
          description: unauthenticated
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  properties:
                    gamedb_game_id:
                      type: integer
                      description: The game (gamedb_games.game_id). Required on create.
                    completion_type:
                      type: string
                      description: How it was completed (e.g. "main", "100%"). Required
                        on create.
                    completed_at:
                      type: string
                      format: date-time
