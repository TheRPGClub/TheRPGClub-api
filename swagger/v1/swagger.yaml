  "/auth/discord":
    get:
      summary: Start Discord OAuth login
      tags:
      - Auth
      description: Begins the Discord OAuth flow. The endpoint stores a CSRF `state`
        value in the session and redirects the browser to Discord's authorization
        URL. Public — does not require authentication.
      security: []
      responses:
        '302':
          description: redirecting to Discord
          headers:
            Location:
              schema:
                type: string
              description: Discord authorization URL with the `state` query parameter
                set.
        '422':
          description: Discord OAuth not configured
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
  "/auth/discord/callback":
    get:
      summary: Discord OAuth callback
      tags:
      - Auth
      description: Exchanges the OAuth `code` for tokens, verifies guild membership
        and roles, upserts the RPG Club user record, issues a `UserSessionToken`,
        and redirects to the configured success URL with the token in the query string.
        Public — does not require authentication.
      security: []
      parameters:
      - name: code
        in: query
        schema:
          type: string
        required: true
        description: OAuth authorization code from Discord.
      - name: state
        in: query
        schema:
          type: string
        required: true
        description: CSRF state value matching the one set at /auth/discord.
      responses:
        '302':
          description: redirecting to the success URL with `?token=…`
          headers:
            Location:
              schema:
                type: string
        '401':
          description: invalid OAuth state or token exchange failed
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
        '403':
          description: caller is not a member of the RPG Club Discord guild
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
        '422':
          description: Discord OAuth not configured
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
  "/auth/logout":
    delete:
      summary: Log out
      tags:
      - Auth
      description: Revokes the bearer `UserSessionToken` (if present), logs out the
        warden session, and resets the cookie session. Authentication is not required
        — the endpoint is safe to call when already logged out.
      security: []
      responses:
        '200':
          description: logged out
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                required:
                - ok
