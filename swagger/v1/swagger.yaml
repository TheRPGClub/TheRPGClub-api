  "/api/v1/gotm_entries":
    get:
      summary: List Game of the Month entries
      tags:
      - GOTM
      description: Returns GOTM (Game of the Month) entries, newest round first. Use
        `include=game` to eager-load the related game record and its images.
      parameters:
      - name: round_number
        in: query
        schema:
          type: integer
        required: false
        description: Filter to a specific round number.
      - name: include
        in: query
        schema:
          type: string
          example: game
        required: false
        description: Comma-separated includes. Currently `game` is supported.
      - name: page
        in: query
        schema:
          type: integer
          default: 1
          minimum: 1
        required: false
      - name: per
        in: query
        schema:
          type: integer
          default: 50
          maximum: 500
        required: false
      - name: limit
        in: query
        schema:
          type: integer
          maximum: 500
        required: false
        description: Deprecated alias for `per` (transitional, for the unaudited Discord
          bot).
      - name: offset
        in: query
        schema:
          type: integer
          minimum: 0
        required: false
        description: Deprecated; converted to a page number (transitional, for the
          unaudited Discord bot).
      responses:
        '200':
          description: GOTM entries
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      "$ref": "#/components/schemas/GotmEntry"
                  meta:
                    "$ref": "#/components/schemas/PaginationMeta"
        '401':
          description: unauthenticated
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
    post:
      summary: Create a Game of the Month entry
      tags:
      - GOTM
      description: Admin/service-only. Inserts one game slot for a round. A round
        can have several games — POST once per game with an incrementing `game_index`
        (unique per round). `voting_results_message_id` is bot-managed and set later
        via PATCH.
      parameters: []
      responses:
        '201':
          description: entry created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    "$ref": "#/components/schemas/GotmEntry"
        '403':
          description: forbidden — caller is not an admin or service
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
        '422':
          description: validation failed (missing required field or duplicate round/game_index)
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
        '400':
          description: missing `data` parameter
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
        '401':
          description: unauthenticated
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  properties:
                    round_number:
                      type: integer
                      description: Round number this entry belongs to.
                    month_year:
                      type: string
                      example: January 2026
                      description: Human-readable month/year label for the round.
                    game_index:
                      type: integer
                      example: 0
                      description: Game slot within the round (0-based); unique per
                        round.
                    gamedb_game_id:
                      type: integer
                      description: The GameDB game for this slot (gamedb_games.game_id).
                    reddit_url:
                      type: string
                      nullable: true
                      description: Optional link to the round's Reddit thread.
                  required:
                  - round_number
                  - month_year
                  - game_index
                  - gamedb_game_id
              required:
              - data
        required: true
