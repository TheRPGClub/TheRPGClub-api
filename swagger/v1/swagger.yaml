          bot).
      - name: offset
        in: query
        schema:
          type: integer
          minimum: 0
        required: false
        description: Deprecated; converted to a page number (transitional, for the
          unaudited Discord bot).
      responses:
        '200':
          description: public reminders
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      "$ref": "#/components/schemas/PublicReminder"
                  meta:
                    "$ref": "#/components/schemas/PaginationMeta"
        '401':
          description: unauthenticated
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
    post:
      summary: Create a public reminder
      tags:
      - Public Reminders
      description: Open to any authenticated caller. `channel_id`, `message` and `due_at`
        are required; `recur_every`/`recur_unit` (recurrence), `enabled` (defaults
        true) and `created_by` are optional.
      parameters: []
      responses:
        '201':
          description: reminder created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    "$ref": "#/components/schemas/PublicReminder"
        '422':
          description: validation failed
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
        '401':
          description: unauthenticated
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  properties:
                    channel_id:
                      type: string
                      description: Channel to post the reminder in. Required on create.
                    message:
                      type: string
                      description: Reminder text. Required on create.
                    due_at:
                      type: string
                      format: date-time
                      description: When the reminder is due. Required on create.
                    recur_every:
                      type: integer
                      nullable: true
                      description: Optional recurrence interval (paired with `recur_unit`).
                    recur_unit:
                      type: string
                      nullable: true
                      description: Optional recurrence unit (e.g. "days").
                    enabled:
                      type: boolean
                      description: Whether the reminder is active. Optional; defaults
                        to true.
                    created_by:
                      type: string
                      nullable: true
                      description: Optional Discord id of the creator.
                  required:
                  - channel_id
                  - message
                  - due_at
              required:
              - data
        required: true
