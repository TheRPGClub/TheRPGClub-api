  "/api/v1/games":
    get:
      summary: List games
      tags:
      - Games
      description: Returns games from the local GameDB. Supports search, a `winner`
        filter for GOTM / Non-Retro GOTM history, and taxonomy filters (genre/engine/theme/perspective/mode/franchise/company).
        Taxonomy params AND across dimensions; repeat one (`genre_id[]=1&genre_id[]=2`)
        to match any of several. Discover valid ids via the `/genres`, `/themes`,
        … endpoints.
      parameters:
      - name: q
        in: query
        schema:
          type: string
        required: false
        description: Full-text search against game titles.
      - name: winner
        in: query
        schema:
          type: string
          enum:
          - gotm
          - nr_gotm
          - any
        required: false
        description: Filter to past GOTM winners, Non-Retro GOTM winners, or either.
      - name: genre_id
        in: query
        required: false
        explode: true
        style: form
        schema:
          type: array
          items:
            type: integer
        description: Filter to games in this genre id (repeat to match any of several).
      - name: engine_id
        in: query
        required: false
        explode: true
        style: form
        schema:
          type: array
          items:
            type: integer
        description: Filter to games using this engine id (repeat to match any of
          several).
      - name: theme_id
        in: query
        required: false
        explode: true
        style: form
        schema:
          type: array
          items:
            type: integer
        description: Filter to games in this theme id (repeat to match any of several).
      - name: perspective_id
        in: query
        required: false
        explode: true
        style: form
        schema:
          type: array
          items:
            type: integer
        description: Filter to games in this perspective id (repeat to match any of
          several).
      - name: mode_id
        in: query
        required: false
        explode: true
        style: form
        schema:
          type: array
          items:
            type: integer
        description: Filter to games in this mode id (repeat to match any of several).
      - name: franchise_id
        in: query
        required: false
        explode: true
        style: form
        schema:
          type: array
          items:
            type: integer
        description: Filter to games in this franchise id (repeat to match any of
          several).
      - name: company_id
        in: query
        required: false
        explode: true
        style: form
        schema:
          type: array
          items:
            type: integer
        description: Filter to games involving this company id (repeat to match any
          of several).
      - name: page
        in: query
        schema:
          type: integer
          default: 1
          minimum: 1
        required: false
      - name: per
        in: query
        schema:
          type: integer
          default: 25
          maximum: 100
        required: false
      - name: limit
        in: query
        schema:
          type: integer
          maximum: 100
        required: false
        description: Deprecated alias for `per` (transitional, for the unaudited Discord
          bot).
      - name: offset
        in: query
        schema:
          type: integer
          minimum: 0
        required: false
        description: Deprecated; converted to a page number (transitional, for the
          unaudited Discord bot).
      responses:
        '200':
          description: games list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
                  meta:
                    allOf:
                    - "$ref": "#/components/schemas/PaginationMeta"
                    - type: object
                      properties:
                        resource:
                          type: string
                          example: gamedb_games
        '401':
          description: unauthenticated
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
  "/api/v1/games/{id}":
