        note_updated_at:
          type: string
          format: date-time
          nullable: true
        has_journal_entry:
          type: boolean
        journal_count:
          type: integer
        last_journal_at:
          type: string
          format: date-time
          nullable: true
        game:
          allOf:
          - "$ref": "#/components/schemas/NowPlayingGame"
          nullable: true
        platform:
          allOf:
          - "$ref": "#/components/schemas/Platform"
          nullable: true
        user:
          "$ref": "#/components/schemas/UserSummary"
      required:
      - entry_id
      - user_id
      - added_at
      - has_journal_entry
      - journal_count
    Review:
      type: object
      properties:
        review_id:
          type: integer
        user_id:
          type: string
        gamedb_game_id:
          type: integer
        rating:
          type: integer
        body:
          type: object
          description: Free-form JSON.
          nullable: true
        is_shared:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required:
      - review_id
      - user_id
      - gamedb_game_id
      - rating
      - is_shared
      - created_at
      - updated_at
    ReviewUserEntry:
      type: object
      properties:
        review_id:
          type: integer
        user_id:
          type: string
        gamedb_game_id:
          type: integer
        rating:
          type: integer
        body:
          type: object
          description: Free-form JSON.
          nullable: true
        created_at:
          type: string
