        filter for GOTM / Non-Retro GOTM history.
      parameters:
      - name: q
        in: query
        schema:
          type: string
        required: false
        description: Full-text search against game titles.
      - name: winner
        in: query
        schema:
          type: string
          enum:
          - gotm
          - nr_gotm
          - any
        required: false
        description: Filter to past GOTM winners, Non-Retro GOTM winners, or either.
      - name: page
        in: query
        schema:
          type: integer
          default: 1
          minimum: 1
        required: false
      - name: per
        in: query
        schema:
          type: integer
          default: 25
          maximum: 100
        required: false
      - name: limit
        in: query
        schema:
          type: integer
          maximum: 100
        required: false
        description: Deprecated alias for `per` (transitional, for the unaudited Discord
          bot).
      - name: offset
        in: query
        schema:
          type: integer
          minimum: 0
        required: false
        description: Deprecated; converted to a page number (transitional, for the
          unaudited Discord bot).
      responses:
        '200':
          description: games list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
                  meta:
                    allOf:
                    - "$ref": "#/components/schemas/PaginationMeta"
                    - type: object
                      properties:
                        resource:
                          type: string
                          example: gamedb_games
        '401':
          description: unauthenticated
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
