  "/api/v1/threads/{id}/links":
    parameters:
    - name: id
      in: path
      schema:
        type: string
      required: true
      description: Thread thread_id.
    post:
      summary: Link a thread to a game
      tags:
      - Threads
      description: Admin/service-only. Idempotent merge — links the thread to the
        game (or returns the existing link) and recomputes the thread's derived `gamedb_game_id`
        (the MIN of its links). 201 when newly linked, 200 when it already was.
      parameters: []
      responses:
        '201':
          description: thread linked
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    "$ref": "#/components/schemas/ThreadGameLink"
        '200':
          description: link already existed
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    "$ref": "#/components/schemas/ThreadGameLink"
        '403':
          description: forbidden — caller is not an admin or service
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
        '422':
          description: validation failed (unknown game)
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
        '404':
          description: thread not found
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
        '401':
          description: unauthenticated
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  properties:
                    gamedb_game_id:
                      type: integer
                      description: The game to link (gamedb_games.game_id).
                  required:
                  - gamedb_game_id
              required:
              - data
        required: true
    delete:
      summary: Remove all of a thread's game links
      tags:
      - Threads
      description: Admin/service-only. Removes every game link from the thread and
        resets the derived `gamedb_game_id` to null.
