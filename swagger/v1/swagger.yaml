              schema:
                "$ref": "#/components/schemas/Error"
  "/api/v1/threads":
    post:
      summary: Upsert a Discord thread
      tags:
      - Threads
      description: 'Admin/service-only. Upserts a thread by `thread_id` (a Discord
        snowflake): inserts a new row, or on an existing one refreshes only `forum_channel_id`,
        `thread_name`, `is_archived`, `last_seen_at` — `skip_linking` and `created_at`
        are left untouched so a sync sweep can''t clobber them. The derived `gamedb_game_id`
        is ignored on write (managed via the link endpoints). `thread_id`, `forum_channel_id`
        and `thread_name` are required.'
      parameters: []
      responses:
        '201':
          description: thread created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    "$ref": "#/components/schemas/Thread"
        '200':
          description: existing thread updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    "$ref": "#/components/schemas/Thread"
        '403':
          description: forbidden — caller is not an admin or service
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
        '422':
          description: validation failed
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
        '400':
          description: missing `data` or `thread_id`
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
        '401':
          description: unauthenticated
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  properties:
                    thread_id:
                      type: string
                      description: Discord thread snowflake (the PK). Required.
                    forum_channel_id:
                      type: string
                      description: The forum channel the thread lives in.
                    thread_name:
                      type: string
                      description: Thread title.
                    is_archived:
                      type: string
                      description: Archived flag, stored as a string (e.g. "true"/"false").
                    last_seen_at:
                      type: string
                      format: date-time
                      nullable: true
                      description: When the bot last saw the thread.
                    skip_linking:
                      type: string
                      description: When set, the bot will not auto-link this thread
                        to games.
                  required:
                  - thread_id
                  - forum_channel_id
                  - thread_name
              required:
              - data
        required: true
