default: &default
  dispatchers:
    - polling_interval: 1
      batch_size: 500
  workers:
    - queues: "*"
      threads: 3
      processes: <%= ENV.fetch("JOB_CONCURRENCY", 1) %>
      polling_interval: 0.1

development:
  <<: *default

test:
  <<: *default

# Production polls the machine-local SQLite queue database
# (config/database.yml) from inside Puma (SOLID_QUEUE_IN_PUMA, fly.toml) on
# an always-on machine, so polling never touches Neon regardless of interval.
# Still no reason to spin at the default 0.1s for a queue that is almost
# always empty: jobs here are enqueued by web requests and worked within one
# poll, so multi-second pickup latency costs nothing.
production:
  dispatchers:
    - polling_interval: 5
      batch_size: 500
  workers:
    - queues: "*"
      threads: 3
      processes: <%= ENV.fetch("JOB_CONCURRENCY", 1) %>
      polling_interval: 2
