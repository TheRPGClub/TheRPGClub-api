# PostgreSQL. Versions 9.5 and up are supported.
#
# Install the pg driver:
#   gem install pg
# On macOS with Homebrew:
#   gem install pg -- --with-pg-config=/opt/homebrew/bin/pg_config
# On Windows:
#   gem install pg
#       Choose the win32 build.
#       Install PostgreSQL and put its /bin directory on your path.
#
# Configure Using Gemfile
# gem "pg"
#
default: &default
  adapter: postgresql
  encoding: unicode
  schema_search_path: public
  # For details on connection pooling, see Rails configuration guide
  # https://guides.rubyonrails.org/configuring.html#database-pooling
  max_connections: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  # Fail fast on dead Neon connections. Neon drops connections on compute
  # restarts/migrations; without these, Puma threads block forever on the dead
  # sockets, /up stops answering, the Fly health check goes critical, and the
  # proxy 503s every request until a manual machine restart (2026-07-22
  # outage). Keepalives detect a silent peer after idle+interval*count
  # (~25s); tcp_user_timeout bounds how long an unacknowledged write may
  # block (Linux-only, ignored elsewhere, milliseconds). Lives in the shared
  # block because DATABASE_URL merges onto every environment's primary, so
  # local development against Neon is covered too.
  connect_timeout: 5
  keepalives: 1
  keepalives_idle: 10
  keepalives_interval: 5
  keepalives_count: 3
  tcp_user_timeout: 15000
  # Server-side cap on any single query. The keepalives above only catch a
  # *dead* peer -- the 2026-07-22 23:24 UTC wedge happened with them live
  # because Neon was slow-but-alive (single queries taking 9s+), so every Puma
  # thread sat in a legitimate wait until /up missed the Fly health check and
  # the proxy pulled the machine. With this, Postgres cancels the query
  # instead (ActiveRecord::StatementInvalid) and the thread frees up. Applies
  # to migrations too: a long DDL statement (e.g. an index build on a big
  # table) must opt out per-migration with `execute "SET statement_timeout = 0"`.
  variables:
    statement_timeout: 30s


development:
  <<: *default
  database: <%= ENV.fetch("RPGCLUB_DATABASE_NAME", "rpgclub_api_development") %>
  username: <%= ENV.fetch("RPGCLUB_DATABASE_USERNAME", "admin") %>
  password: <%= ENV["RPGCLUB_DATABASE_PASSWORD"].inspect %>
  host: <%= ENV.fetch("RPGCLUB_DATABASE_HOST", "127.0.0.1") %>
  port: <%= ENV.fetch("RPGCLUB_DATABASE_PORT", 5432) %>

  # The specified database role being used to connect to PostgreSQL.
  # To create additional roles in PostgreSQL see `$ createuser --help`.
  # When left blank, PostgreSQL will use the default role. This is
  # the same name as the operating system user running Rails.
  #username: rpg_club

  # The password associated with the PostgreSQL role (username).
  #password:

  # Connect on a TCP socket. Omitted by default since the client uses a
  # domain socket that doesn't need configuration. Windows does not have
  # domain sockets, so uncomment these lines.
  #host: localhost

  # The TCP port the server listens on. Defaults to 5432.
  # If your server runs on a different port number, change accordingly.
  #port: 5432

  # Schema search path. The server defaults to $user,public
  #schema_search_path: myapp,sharedapp,public

  # Minimum log levels, in increasing order:
  #   debug5, debug4, debug3, debug2, debug1,
  #   log, notice, warning, error, fatal, and panic
  # Defaults to warning.
  #min_messages: notice

# Warning: The database defined as "test" will be erased and
# re-generated from your development database when you run "rake".
# Do not set this db to the same as development or production.
test:
  <<: *default
  # Database name is fixed (never read from RPGCLUB_DATABASE_NAME) so it can
  # never collide with the development database. Connection params mirror the
  # development block so the suite is runnable locally and against the CI
  # PostgreSQL service container.
  database: rpg_club_test
  username: <%= ENV.fetch("RPGCLUB_DATABASE_USERNAME", "admin") %>
  password: <%= ENV["RPGCLUB_DATABASE_PASSWORD"].inspect %>
  host: <%= ENV.fetch("RPGCLUB_DATABASE_HOST", "127.0.0.1") %>
  port: <%= ENV.fetch("RPGCLUB_DATABASE_PORT", 5432) %>

# As with config/credentials.yml, you never want to store sensitive information,
# like your database password, in your source code. If your source code is
# ever seen by anyone, they now have access to your database.
#
# Instead, provide the password or a full connection URL as an environment
# variable when you boot the app. For example:
#
#   DATABASE_URL="postgres://myuser:mypass@localhost/somedatabase"
#
# If the connection URL is provided in the special DATABASE_URL environment
# variable, Rails will automatically merge its configuration values on top of
# the values provided in this file. Alternatively, you can specify a connection
# URL environment variable explicitly:
#
#   production:
#     url: <%= ENV["MY_APP_DATABASE_URL"] %>
#
# Connection URLs for non-primary databases can also be configured using
# environment variables. The variable name is formed by concatenating the
# connection name with `_DATABASE_URL`. For example:
#
#   CACHE_DATABASE_URL="postgres://cacheuser:cachepass@localhost/cachedatabase"
#
# Read https://guides.rubyonrails.org/configuring.html#configuring-a-database
# for a full overview on how database connection configuration can be specified.
#
production:
  primary: &primary_production
    <<: *default
    url: <%= ENV["DATABASE_URL"] %>
  cache:
    <<: *primary_production
    database: rpg_club_production_cache
    migrations_paths: db/cache_migrate
    url: <%= URI.parse(ENV["DATABASE_URL"]).tap { |url| url.path += "_cache" } if ENV["DATABASE_URL"] %>
  # Machine-local SQLite, not Neon: Solid Queue runs inside Puma on an
  # always-on machine (fly.toml) and polls its database every few seconds
  # around the clock -- on Neon that steady polling would reset the
  # autosuspend timer forever and keep the compute awake 24/7. The file is
  # recreated from db/queue_schema.rb by bin/docker-entrypoint's
  # db:queue:bootstrap on every fresh machine boot (the rootfs is ephemeral),
  # so pending jobs don't survive a deploy -- fine for this app's
  # enqueue-and-run-now jobs.
  queue:
    adapter: sqlite3
    database: storage/production_queue.sqlite3
    migrations_paths: db/queue_migrate
    # SQLite busy handler (ms), as in stock Rails sqlite configs. Without it,
    # the supervisor's forked processes racing to register at boot can raise
    # SQLite3::BusyException ("database is locked") -- v66 lost its first
    # Scheduler child to exactly that (the supervisor replaced it).
    timeout: 5000
