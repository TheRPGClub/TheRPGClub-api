# fly.toml app configuration file generated for therpgclub-api on 2026-06-13T14:21:26+01:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'therpgclub-api'
primary_region = 'iad'
console_command = '/rails/bin/rails console'

[build]

[deploy]
  # db:cache:bootstrap covers what db:prepare silently skips: with
  # schema_format = :sql it looks for db/cache_structure.sql, which doesn't
  # exist (Solid Cache ships db/cache_schema.rb), so a fresh cache database
  # would come up empty. No-op when the schema is already there.
  release_command = './bin/rails db:prepare db:cache:bootstrap'

[env]
  PORT = '8080'
  # Run the Solid Queue supervisor inside Puma (config/puma.rb) instead of a
  # dedicated worker machine. Its around-the-clock polling stays off Neon
  # because the queue database is machine-local SQLite (config/database.yml).
  SOLID_QUEUE_IN_PUMA = 'true'

[processes]
  app = './bin/rails server -b 0.0.0.0 -p 8080'

[http_service]
  internal_port = 8080
  force_https = true
  # Always-on: cold starts made the bot wait out a full Rails boot after any
  # idle period. Neon still autosuspends between requests -- the only 24/7
  # activity is Solid Queue polling, which targets machine-local SQLite.
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [[http_service.checks]]
    interval = '10s'
    # 5s, up from 2s: /up needs a free Puma thread, so under a burst of slow
    # requests a merely-busy machine missed the 2s deadline and the proxy
    # pulled our only machine out of routing (2026-07-22 23:24 UTC outage).
    timeout = '5s'
    grace_period = '5s'
    method = 'GET'
    path = '/up'
    protocol = 'http'
    tls_skip_verify = false

    [http_service.checks.headers]
      X-Forwarded-Proto = 'https'

[[vm]]
  memory = '512mb'
  cpus = 1
  memory_mb = 512
