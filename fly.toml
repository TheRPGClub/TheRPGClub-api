# fly.toml app configuration file generated for therpgclub-api on 2026-06-13T14:21:26+01:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'therpgclub-api'
primary_region = 'iad'
console_command = '/rails/bin/rails console'

[build]

[deploy]
  release_command = './bin/rails db:prepare'

[env]
  PORT = '8080'
  # Run the Solid Queue supervisor inside Puma (config/puma.rb) instead of a
  # dedicated worker machine: jobs are only enqueued by web requests, so the
  # machine is always awake to work them, and a standalone worker would keep
  # both a Fly machine and the Neon queue DB awake 24/7 polling for nothing.
  SOLID_QUEUE_IN_PUMA = 'true'

[processes]
  app = './bin/rails server -b 0.0.0.0 -p 8080'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [[http_service.checks]]
    interval = '10s'
    timeout = '2s'
    grace_period = '5s'
    method = 'GET'
    path = '/up'
    protocol = 'http'
    tls_skip_verify = false

    [http_service.checks.headers]
      X-Forwarded-Proto = 'https'

[[vm]]
  memory = '512mb'
  cpus = 1
  memory_mb = 512
